alertmanager:
  alertmanagerSpec:
    storage:
    volumeClaimTemplate:
      spec:
        storageClassName: nas-nfs-client

grafana:
  persistence:
    enabled: true
    type: sts
    storageClassName: nas-nfs-client

prometheus:
  prometheusSpec:
    retention: ""
    retentionSize: "1TB"
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: nas-nfs-client
          accesModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
