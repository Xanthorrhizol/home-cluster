apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: claude-code
  namespace: claude-code
spec:
  parentRefs:
    - name: home-gateway
      namespace: envoy-gateway-system
  hostnames:
    - claude.DOMAIN
  rules:
    - backendRefs:
        - name: claude-code
          port: 7681
      matches:
        - path:
            type: PathPrefix
            value: /
